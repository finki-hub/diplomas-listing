name = "finki-hub-diplomas-api"
main = "src/index.ts"
compatibility_date = "2025-02-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
# POSTHOG_KEY is supplied at deploy (e.g. `wrangler secret put POSTHOG_KEY`) to enable analytics; absent = off.
POSTHOG_HOST = "https://eu.i.posthog.com"

[placement]
mode = "smart"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[[routes]]
pattern = "diplomas-api.finki-hub.com/*"
zone_name = "finki-hub.com"

[[routes]]
pattern = "diplomski-api.finki-hub.com/*"
zone_name = "finki-hub.com"
